defaults:
  - _self_

seed: 42

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "HPO_Lab3"
  log_model: true
  register_model: false
  model_name: "BestOptimizedModel"
  stage: "Staging"

data:
  train_path: "data/prepared/train.csv"
  test_path: "data/prepared/test.csv"

hpo:
  n_trials: 20
  sampler: "tpe"       # tpe | random | grid
  metric: "f1"         # f1 | roc_auc
  direction: "maximize"
  use_cv: false
  cv_folds: 5

model:
  type: "xgboost"      # xgboost | random_forest | logistic_regression
  xgboost:
    n_estimators:
      low: 50
      high: 300
    max_depth:
      low: 2
      high: 10
    learning_rate:
      low: 0.01
      high: 0.3
    subsample:
      low: 0.6
      high: 1.0
    colsample_bytree:
      low: 0.6
      high: 1.0
    min_child_weight:
      low: 1
      high: 10
    gamma:
      low: 0.0
      high: 1.0
    reg_alpha:
      low: 0.0
      high: 1.0
    reg_lambda:
      low: 0.5
      high: 2.0
  random_forest:
    n_estimators:
      low: 50
      high: 300
    max_depth:
      low: 3
      high: 15
    min_samples_split:
      low: 2
      high: 10
    min_samples_leaf:
      low: 1
      high: 5
    max_features:
      - "sqrt"
      - "log2"
  logistic_regression:
    C:
      low: 0.001
      high: 100.0
    solver:
      - "liblinear"
      - "lbfgs"
    penalty:
      - "l2"

hydra:
  run:
    dir: .
  output_subdir: null
