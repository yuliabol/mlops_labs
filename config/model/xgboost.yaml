# @package _global_
model:
  type: "xgboost"
  xgboost:
    n_estimators:
      low: 50
      high: 300
    max_depth:
      low: 2
      high: 10
    learning_rate:
      low: 0.01
      high: 0.3
    subsample:
      low: 0.6
      high: 1.0
    colsample_bytree:
      low: 0.6
      high: 1.0
    min_child_weight:
      low: 1
      high: 10
    gamma:
      low: 0.0
      high: 1.0
    reg_alpha:
      low: 0.0
      high: 1.0
    reg_lambda:
      low: 0.5
      high: 2.0
